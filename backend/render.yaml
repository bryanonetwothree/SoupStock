# render.yaml
# Render will use this file to automatically configure your web service.
# You can also configure this manually in the Render dashboard.

services:
  - type: web
    name: soupstock-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false   # You will fill this in the Render dashboard
      - key: SUPABASE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
